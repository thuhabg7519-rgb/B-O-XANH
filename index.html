<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Báo Xanh Toolbar</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    margin:0;
    padding:20px;
    background:#ffffff;
    font-family:Arial,sans-serif;
    min-height:2000px;
}

.toolbar{

    position:fixed;

    right:20px;
    top:50%;

    transform:translateY(-50%);

    width:60px;

    background:#ffffff;

    border-radius:35px;

    padding:12px 0;

    z-index:999999;
}

.toolbar button{

    width:42px;
    height:42px;

    margin:4px auto;

    border:none;

    background:none;

    cursor:pointer;

    font-size:18px;

    color:#8c8c8c;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:.25s;
}

.toolbar button:hover{

    color:#38761d;

    background:#f7f7f7;

    border-radius:50%;
}

.comment-box{

    position:fixed;

    right:90px;
    top:50%;

    transform:translateY(-50%);

    width:280px;

    background:#ffffff;

    border:1px solid #e8e8e8;

    border-radius:14px;

    padding:15px;

    display:none;
}

.comment-box textarea{

    width:100%;
    height:120px;

    border:1px solid #38761d;

    border-radius:10px;

    padding:12px;

    resize:none;

    box-sizing:border-box;
}

.comment-box button{

    width:100%;
    height:44px;

    margin-top:12px;

    border:none;

    background:#38761d;

    color:white;

    border-radius:10px;

    cursor:pointer;
}

</style>

</head>

<body>

<div class="toolbar">

<button onclick="increaseFont()">
A
</button>

<button onclick="decreaseFont()">
<span style="font-size:14px;">A</span>
</button>

<button onclick="copyLink()">
<i class="fa-solid fa-link"></i>
</button>

<button onclick="toggleComment()">
<i class="fa-regular fa-comment"></i>
</button>

<button onclick="savePage()">
<i class="fa-regular fa-bookmark"></i>
</button>

<button onclick="window.print()">
<i class="fa-solid fa-print"></i>
</button>

</div>

<div class="comment-box" id="commentBox">

<textarea
placeholder="Nhập bình luận của bạn...">
</textarea>

<button>
Gửi bình luận
</button>

</div>

<script>

let currentSize = 16;

function increaseFont(){
    currentSize += 2;
    document.body.style.fontSize =
    currentSize + "px";
}

function decreaseFont(){

    currentSize -= 2;

    if(currentSize < 12){
        currentSize = 12;
    }

    document.body.style.fontSize =
    currentSize + "px";
}

function copyLink(){

navigator.clipboard.writeText(
window.location.href);

alert("Đã sao chép liên kết");
}

function toggleComment(){

let box =
document.getElementById("commentBox");

if(box.style.display=="block"){

box.style.display="none";

}else{

box.style.display="block";

}
}

function savePage(){

alert("Đã lưu bài viết");

}

</script>

</body>
</html>
